# PocketSage — Render.com deployment configuration
services:
  - type: web
    name: pocketsage
    runtime: python
    region: frankfurt  # Plus proche de l'Afrique de l'Ouest
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python api.py
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # À renseigner manuellement dans Render dashboard
      - key: APP_PORT
        value: 10000
      - key: DATA_DIR
        value: ./data
      - key: DEFAULT_LANG
        value: fr
      - key: APP_ENV
        value: production
    healthCheckPath: /health